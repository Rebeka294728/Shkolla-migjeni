<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f4f7fc;
    color:#222;
}

/* HEADER */
header{
    background:linear-gradient(to bottom,#0b4db3,#003b91);
    text-align:center;
    color:white;
    padding:30px 20px;
}

.logo{
    width:120px;
    height:120px;
    background:white;
    border-radius:50%;
    object-fit:contain;
    margin-bottom:15px;
}

header h1{
    font-size:45px;
}

header p{
    font-size:20px;
    letter-spacing:2px;
}

/* NAV */
nav{
    background:#002d72;
    padding:18px;
    position:sticky;
    top:0;
    z-index:1000;
}

nav ul{
    display:flex;
    justify-content:center;
    align-items: center;
    gap:40px;
    list-style:none;
}

nav a{
    color:white;
    text-decoration:none;
    font-size:18px;
    transition:0.3s;
}

nav a:hover{
    color:#a8c8ff;
}


/* TITULL */
.title{
    text-align:center;
    font-size:40px;
    margin:60px 0;
    color:#003b91;
}

/* KONTAKT LAYOUT */
.contact-wrap{
    display:flex;
    justify-content:center;
    gap:80px;
    flex-wrap:wrap;
    margin-top:20px;
    text-align:center;
}

/* LOGO IMAGES */
.contact-item img{
    width:120px;
    height:120px;
    display:flex;
    justify-content:center;
    align-items:center;
}



/* EMAIL (CSS) */
.email-box{
    width:120px;
    height:120px;
    border-radius:20px;
    background:#003b91;
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
    transition:0.3s;
}

.email-box::before{
    content:"@";
    color:white;
    font-size:55px;
    font-weight:bold;
}

.email-box p{
    position:absolute;
    bottom:-25px;
    font-size:13px;
    color:#333;
}

/* FOOTER */
footer{
    background:#002d72;
    color:white;
    text-align:center;
    padding:30px;
    margin-top:80px;
}

/* MOBILE */
@media(max-width:768px){

    header h1{
        font-size:38px;
    }

    .hero h2{
        font-size:42px;
    }

    .hero p{
        font-size:20px;
    }

    nav ul{
        flex-direction:column;
        align-items:center;
        gap:15px;
    }
}
</style>
</head>
